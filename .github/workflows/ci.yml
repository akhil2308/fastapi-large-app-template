name: CI

on:
  push:
  pull_request:

env:
  # Settings load JWT_SECRET_KEY with no default; provide a throwaway value for CI.
  JWT_SECRET_KEY: ci-test-secret-not-used-in-production  # pragma: allowlist secret

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password  # pragma: allowlist secret
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy .

      - name: Apply migrations
        run: uv run alembic -c app/alembic.ini upgrade head

      - name: Check for un-migrated model changes
        run: uv run alembic -c app/alembic.ini check

      - name: Run tests with coverage
        run: uv run pytest tests/ --cov=app --cov-report=term-missing

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
