# Secret — fastapi-app-secret
# Stores sensitive credentials consumed by the app container via envFrom.
#
# !! IMPORTANT !!
# Replace every "CHANGE_ME" value before deploying.
# Do NOT commit real secrets to version control.  Use a secrets manager
# (e.g. Vault, AWS Secrets Manager, Sealed Secrets) to inject values at
# deploy time, or supply them via your CI/CD pipeline.
#
# stringData values are automatically base64-encoded by Kubernetes; you do
# not need to encode them manually here.
apiVersion: v1
kind: Secret
metadata:
  name: fastapi-app-secret
  namespace: fastapi-app
  labels:
    app: fastapi-app
    component: app
type: Opaque
stringData:
  POSTGRES_PASSWORD: "CHANGE_ME"  # pragma: allowlist secret
  REDIS_PASSWORD: "CHANGE_ME"  # pragma: allowlist secret
  # HS256 signing key for access JWTs — must be a long random string.
  JWT_SECRET_KEY: "CHANGE_ME"  # pragma: allowlist secret
