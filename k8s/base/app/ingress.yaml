# Ingress — fastapi-app
# Routes external HTTPS traffic to the ClusterIP Service.
# Uncomment the annotation block that matches your ingress controller.
# Replace "yourdomain.com" with the actual hostname for the environment.
#
# TLS certificate provisioning:
#   - cert-manager + Let's Encrypt is the standard approach.  Install
#     cert-manager, create a ClusterIssuer named "letsencrypt-prod", then
#     the annotation below triggers automatic certificate issuance.
#   - For manual certs, create the TLS Secret yourself and remove the
#     cert-manager annotation.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fastapi-app
  namespace: fastapi-app
  labels:
    app: fastapi-app
    component: app
  annotations:
    # ── nginx-ingress-controller ──────────────────────────────────────────
    # Uncomment this block when using kubernetes/ingress-nginx.
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    # cert-manager auto-issues a Let's Encrypt certificate for the host below.
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # ── Traefik (v2/v3) ───────────────────────────────────────────────────
    # Uncomment this block and comment out the nginx block when using Traefik.
    # kubernetes.io/ingress.class: "traefik"
    # traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
    # traefik.ingress.kubernetes.io/router.tls: "true"
    # traefik.ingress.kubernetes.io/router.tls.certresolver: "letsencrypt"
spec:
  # tls block provisions/references the certificate for the host.
  tls:
    - hosts:
        - yourdomain.com
      # cert-manager creates this Secret automatically; pre-create it for
      # manual certificates.
      secretName: fastapi-app-tls  # pragma: allowlist secret
  rules:
    - host: yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fastapi-app
                port:
                  name: http
